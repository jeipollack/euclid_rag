llm:
  model: "gemma3:4b"
  temperature: 0

embeddings:
  class: "E5MpsEmbedder"
  model_name: "intfloat/e5-small-v2"
  batch_size: 16

data:
  sources:
    euclid_overview_pdf:
      format: "pdf"
      path: "papers/Euclid_I_Overview_of_the_Euclid_mission.pdf"
      chunk_size: 800
      chunk_overlap: 100

    # redmine_wiki:
    #   format: "md"
    #   path: "redmine_wiki/Euclid_Redmine_Wiki.md"
    #   chunk_size: 500
    #   chunk_overlap: 50

vector_store:
  stores:
    # Public-facing documentation (safe for external sharing)
    euclid_public:
      type: "external"
      index_dir: "faiss_euclid_external"
      sources:
        - euclid_overview_pdf

    # Internal-only docs (restricted Redmine content, ops info, etc.)
    euclid_internal:
      type: "internal"
      index_dir:
      sources:
